name: CI

on: [push]

permissions: {}

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version-file: '.java-version'
          cache: 'maven'
      - run: mvn package
